{% extends "cast/bootstrap5/blog_list_of_posts.html" %}

{% block hero_canvas %}<canvas id="heroCanvas"></canvas>{% endblock hero_canvas %}

{% block template_script %}
  <script>
    (function() {
      function accentHeroTitle() {
        var title = document.querySelector('.cast-hero .blog-title');
        if (!title || title.dataset.heroAccentApplied === '1') return;

        var text = (title.textContent || '').trim().replace(/\s+/g, ' ');
        if (!text) return;

        var splitIndex = text.indexOf(' ');
        var firstWord = splitIndex === -1 ? text : text.slice(0, splitIndex);
        var rest = splitIndex === -1 ? '' : text.slice(splitIndex);

        title.textContent = '';
        var accent = document.createElement('span');
        accent.className = 'python-accent';
        accent.textContent = firstWord;
        title.appendChild(accent);
        if (rest) {
          title.appendChild(document.createTextNode(rest));
        }
        title.dataset.heroAccentApplied = '1';
      }

      var canvas = document.getElementById('heroCanvas');
      if (!canvas || canvas.dataset.heroInit) return;
      canvas.dataset.heroInit = '1';
      var ctx = canvas.getContext('2d');
      if (!ctx) return;

      function isDarkTheme() {
        return document.documentElement.getAttribute('data-bs-theme') === 'dark';
      }

      function resizeCanvas() {
        var hero = canvas.parentElement;
        if (!hero) return;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = hero.offsetWidth * dpr;
        canvas.height = hero.offsetHeight * dpr;
        canvas.style.width = hero.offsetWidth + 'px';
        canvas.style.height = hero.offsetHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function lineColor(alpha) {
        return isDarkTheme()
          ? 'rgba(167, 139, 250, ' + alpha + ')'
          : 'rgba(124, 58, 237, ' + alpha + ')';
      }

      function bgColor() {
        return isDarkTheme() ? '#1a1a2e' : '#eeeef4';
      }

      function noise(x, y, seed) {
        var s = seed || 0;
        return (
          Math.sin(x * 0.012 + y * 0.009 + s) * 0.45 +
          Math.sin(x * 0.008 - y * 0.014 + s + 1.7) * 0.35 +
          Math.sin(x * 0.019 + y * 0.005 + s + 3.1) * 0.25 +
          Math.cos(x * 0.01 + y * 0.012 + s + 0.5) * 0.3
        );
      }

      function drawWaveform() {
        resizeCanvas();
        var W = canvas.parentElement ? canvas.parentElement.offsetWidth : canvas.offsetWidth;
        var H = canvas.parentElement ? canvas.parentElement.offsetHeight : canvas.offsetHeight;
        if (!W || !H) return;

        ctx.fillStyle = bgColor();
        ctx.fillRect(0, 0, W, H);

        var numWaves = 12;
        var centerY = H / 2;
        for (var i = 0; i < numWaves; i++) {
          var offset = (i - numWaves / 2) * (H / (numWaves + 4));
          var freq = 0.003 + i * 0.0008;
          var amp = 15 + Math.abs(noise(i * 100, 0, 3.3)) * 30;
          var phase = i * 1.3;
          var alpha = i % 3 === 0 ? 0.16 : (i % 3 === 1 ? 0.09 : 0.05);

          ctx.strokeStyle = lineColor(alpha);
          ctx.lineWidth = i % 3 === 0 ? 1.8 : 1.0;
          ctx.beginPath();
          for (var x = 0; x <= W; x += 2) {
            var y = centerY + offset +
            Math.sin(x * freq + phase) * amp +
            Math.sin(x * freq * 2.3 + phase + 1) * amp * 0.3 +
            Math.sin(x * freq * 0.5 + phase + 2.5) * amp * 0.5;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }

      var rafId = 0;
      function scheduleRedraw() {
        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(drawWaveform);
      }

      accentHeroTitle();
      drawWaveform();
      window.addEventListener('resize', scheduleRedraw);
      new MutationObserver(scheduleRedraw)
        .observe(document.documentElement, { attributes: true, attributeFilter: ['data-bs-theme'] });
    })();
  </script>
{% endblock template_script %}
